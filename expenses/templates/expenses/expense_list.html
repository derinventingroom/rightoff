{% extends 'base.html' %}

{% block content %}

<h1 class="mb-4">
    All Expenses
</h1>

<div class="d-flex justify-content-between mb-4">

    <a
        href="/export/"
        class="btn btn-success"
    >
        Export CSV
    </a>

</div>

<form method="GET" class="mb-4">

    <div class="row">

    <div class="col-md-5">

        <input
            type="text"
            name="search"
            class="form-control"
            placeholder="Search descriptions..."
            value="{{ search_query|default:'' }}"
        >

    </div>

    <div class="col-md-4">

        <select
            name="category"
            class="form-select"
        >

            <option value="">
                All Categories
            </option>

            {% for category in categories %}

            <option
                value="{{ category }}"
                {% if category == category_filter %}
                    selected
                {% endif %}
            >
                {{ category }}
            </option>

            {% endfor %}

        </select>

    </div>

    <div class="col-md-3">

        <button
            type="submit"
            class="btn btn-primary w-100"
        >
            Filter
        </button>

    </div>

</div>

</form>

<div class="mt-2 mb-4">

    <a
        href="/list/"
        class="btn btn-secondary btn-sm"
    >
        Clear Filters
    </a>

</div>

<table class="table table-striped table-hover">

    <thead>
        <tr>
            <th>Date</th>
            <th>Category</th>
            <th>Description</th>
            <th>Amount</th>
            <th>Actions</th>
        </tr>
    </thead>

    <tbody>

        {% for expense in expenses %}

        <tr>
            <td>{{ expense.date }}</td>
            <td>{{ expense.category }}</td>
            <td>{{ expense.description }}</td>
            <td>${{ expense.amount }}</td>

            <td>

                <a
                    href="/edit/{{ expense.id }}/"
                    class="btn btn-sm btn-warning"
                >
                    Edit
                </a>

                <a
                    href="/delete/{{ expense.id }}/"
                    class="btn btn-sm btn-danger"
                >
                    Delete
                </a>

            </td>
        </tr>

        {% endfor %}

    </tbody>

</table>

{% endblock %}
