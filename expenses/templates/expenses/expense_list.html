{% extends 'base.html' %}

{% block content %}

<h1 class="mb-4">
    All Expenses
</h1>

<table class="table table-striped table-hover">

    <thead>
        <tr>
            <th>Date</th>
            <th>Category</th>
            <th>Description</th>
            <th>Amount</th>
        </tr>
    </thead>

    <tbody>

        {% for expense in expenses %}

        <tr>
            <td>{{ expense.date }}</td>
            <td>{{ expense.category }}</td>
            <td>{{ expense.description }}</td>
            <td>${{ expense.amount }}</td>
        </tr>

        {% endfor %}

    </tbody>

</table>

{% endblock %}
