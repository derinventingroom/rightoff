{% extends 'base.html' %}

{% block content %}

<h1 class="mb-4">
    All Expenses
</h1>

<div class="mb-3">

    <a
        href="/export/"
        class="btn btn-success"
    >
        Export CSV
    </a>

</div>

<table class="table table-striped table-hover">

    <thead>
        <tr>
            <th>Date</th>
            <th>Category</th>
            <th>Description</th>
            <th>Amount</th>
            <th>Actions</th>
        </tr>
    </thead>

    <tbody>

        {% for expense in expenses %}

        <tr>
            <td>{{ expense.date }}</td>
            <td>{{ expense.category }}</td>
            <td>{{ expense.description }}</td>
            <td>${{ expense.amount }}</td>

            <td>

                <a
                    href="/edit/{{ expense.id }}/"
                    class="btn btn-sm btn-warning"
                >
                    Edit
                </a>

                <a
                    href="/delete/{{ expense.id }}/"
                    class="btn btn-sm btn-danger"
                >
                    Delete
                </a>

            </td>
        </tr>

        {% endfor %}

    </tbody>

</table>

{% endblock %}
