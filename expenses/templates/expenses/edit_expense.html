{% extends 'base.html' %}

{% block content %}

<div class="card shadow-sm">

    <div class="card-header">
        Edit Expense
    </div>

    <div class="card-body">

        <form method="POST">

            {% csrf_token %}

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label class="form-label">
                        Date
                    </label>
                    {{ form.date }}
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">
                        Category
                    </label>
                    {{ form.category }}
                </div>

            </div>

            <div class="mb-3">
                <label class="form-label">
                    Description
                </label>
                {{ form.description }}
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Amount
                </label>
                {{ form.amount }}
            </div>

            <button
                type="submit"
                class="btn btn-success"
            >
                Save Changes
            </button>

            <a
                href="/list/"
                class="btn btn-secondary"
            >
                Cancel
            </a>

        </form>

    </div>

</div>

{% endblock %}
